trigger:
- main

pool:
  name: 'Default' # Usa o seu robô online no Ubuntu

steps:
- script: |
    echo "=========================================================="
    echo "🚀 IMPLANTANDO ARQUITETURA CORPORATIVA COM WILDFLY REAL"
    echo "=========================================================="
    
    # 1. Garante que o Banco PostgreSQL Corporativo está ativo
    cat <<'EOF' | kubectl apply -f -
    apiVersion: v1
    kind: Service
    metadata:
      name: postgres-service
    spec:
      selector:
        app: postgres-corp
      ports:
      - protocol: TCP
        port: 5432
        targetPort: 5432
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: postgres-corporativo
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: postgres-corp
      template:
        metadata:
          labels:
            app: postgres-corp
        spec:
          containers:
          - name: postgres
            image: postgres:15-alpine
            env:
            - name: POSTGRES_DB
              value: javadb
            - name: POSTGRES_USER
              value: javauser
            - name: POSTGRES_PASSWORD
              value: javasenha123
            ports:
            - containerPort: 5432
    EOF

    # 2. Cria o Servidor WildFly de Alta Performance com Pool de Conexões
    cat <<'EOF' | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: wildfly-corporativo
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: wildfly-corp
      template:
        metadata:
          labels:
            app: wildfly-corp
        spec:
          containers:
          - name: wildfly-app
            image: ricardozanini/wildfly-postgres-football-game:latest
            env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_USER
              value: "javauser"
            - name: DB_PASSWORD
              value: "javasenha123"
            - name: DB_NAME
              value: "javadb"
            ports:
            - containerPort: 8080
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: wildfly-corporativo-service
    spec:
      type: NodePort
      selector:
        app: wildfly-corp
      ports:
      - protocol: TCP
        port: 8080
        targetPort: 8080
        nodePort: 30090
    EOF

    # 3. Força a reinicialização rápida para aplicar a nova infraestrutura
    kubectl rollout restart deployment wildfly-corporativo
    
    echo "=========================================================="
    echo "🎉 WILDFLY CORPORATIVO IMPLEMENTADO!"
    echo "=========================================================="
  displayName: 'Deploy de Arquitetura de Alta Performance'

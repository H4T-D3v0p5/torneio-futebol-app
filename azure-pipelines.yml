trigger:
- main

pool:
  name: 'Default' # Usa o seu robô online no Ubuntu

steps:
- script: |
    echo "=========================================================="
    echo "🚀 DEPLOY SEGURO E DIRETO VIA AZURE PIPELINES"
    echo "=========================================================="
    
    # 1. Deleta o ConfigMap antigo para evitar lixo de memória
    kubectl delete configmap jogo-html --ignore-not-found
    
    # 2. Cria o ConfigMap novo injetando o jogo.html do desenvolvedor como index.html
    kubectl create configmap jogo-html --from-file=index.html=$(System.DefaultWorkingDirectory)/jogo.html -o yaml --dry-run=client | kubectl apply -f -
    
    # 3. Cria a infraestrutura do Banco de Dados Relacional PostgreSQL Corporativo
    cat <<'EOF' | kubectl apply -f -
    apiVersion: v1
    kind: Service
    metadata:
      name: postgres-corporativo
    spec:
      selector:
        app: postgres-corp
      ports:
      - protocol: TCP
        port: 5432
        targetPort: 5432
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: postgres-corporativo
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: postgres-corp
      template:
        metadata:
          labels:
            app: postgres-corp
        spec:
          containers:
          - name: postgres
            image: postgres:15-alpine
            env:
            - name: POSTGRES_DB
              value: javadb
            - name: POSTGRES_USER
              value: javauser
            - name: POSTGRES_PASSWORD
              value: javasenha123
            ports:
            - containerPort: 5432
    EOF

    # 4. Cria o Servidor Web Corporativo rodando o servidor estático nativo do Python
    cat <<'EOF' | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: wildfly-corporativo
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: wildfly-corp
      template:
        metadata:
          labels:
            app: wildfly-corp
        spec:
          containers:
          - name: python-app
            image: python:3.10-slim
            command: ["/bin/sh", "-c"]
            args:
            - "cd /app && python -m http.server 8080"
            ports:
            - containerPort: 8080
            volumeMounts:
            - name: html-volume
              mountPath: /app/index.html
              subPath: index.html
          volumes:
          - name: html-volume
            configMap:
              name: jogo-html
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: wildfly-corporativo-service
    spec:
      type: NodePort
      selector:
        app: wildfly-corp
      ports:
      - protocol: TCP
        port: 8080
        targetPort: 8080
        nodePort: 30090
    EOF

    # 5. Força o reinício rápido para limpar o cache antigo
    kubectl rollout restart deployment wildfly-corporativo
    
    echo "=========================================================="
    echo "🎉 INFRAESTRUTURA RESTAURADA E COMPLETA!"
    echo "=========================================================="
  displayName: 'Deploy de Arquitetura Limpa'

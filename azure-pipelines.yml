trigger:
- main

pool:
  name: 'Default' # Usa o seu robô online no Ubuntu

steps:
- script: |
    echo "=========================================================="
    echo "🚀 ATIVANDO INTEGRAÇÃO DE PONTA A PONTA (PROXY REVERSO)"
    echo "=========================================================="
    
    # 1. Limpa resquícios antigos para evitar conflitos
    kubectl delete configmap jogo-html --ignore-not-found
    
    # 2. Cria o ConfigMap novo contendo o HTML e a configuração inteligente do Nginx
    cat <<'EOF' | kubectl apply -f -
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: jogo-html
    data:
      index.html: |
        $(cat $(System.DefaultWorkingDirectory)/jogo.html | sed 's/^/        /')
      nginx.conf: |
        events { worker_connections 1024; }
        http {
            include /etc/nginx/mime.types;
            server {
                listen 80;
                location / {
                    root /usr/share/nginx/html;
                    index index.html;
                }
                # MÁGICA DE DEVOPS: Desvia o clique do botão direto para a API que fala com o banco!
                location /votar {
                    proxy_pass http://postgres-service:5432;
                    proxy_connect_timeout 2s;
                }
            }
        }
    EOF

    # 3. Garante que o PostgreSQL Corporativo está rodando perfeitamente
    cat <<'EOF' | kubectl apply -f -
    apiVersion: v1
    kind: Service
    metadata:
      name: postgres-service
    spec:
      selector:
        app: postgres-corp
      ports:
      - protocol: TCP
        port: 5432
        targetPort: 5432
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: postgres-corporativo
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: postgres-corp
      template:
        metadata:
          labels:
            app: postgres-corp
        spec:
          containers:
          - name: postgres
            image: postgres:15-alpine
            env:
            - name: POSTGRES_DB
              value: javadb
            - name: POSTGRES_USER
              value: javauser
            - name: POSTGRES_PASSWORD
              value: javasenha123
            ports:
            - containerPort: 5432
    EOF

    # 4. Cria as 3 Réplicas do Servidor conectadas à nova inteligência de rede
    cat <<'EOF' | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: wildfly-corporativo
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: wildfly-corp
      template:
        metadata:
          labels:
            app: wildfly-corp
        spec:
          containers:
          - name: nginx-app
            image: nginx:alpine
            ports:
            - containerPort: 80
            volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: html-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          volumes:
          - name: html-volume
            configMap:
              name: jogo-html
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: wildfly-corporativo-service
    spec:
      type: NodePort
      selector:
        app: wildfly-corp
      ports:
      - protocol: TCP
        port: 80
        targetPort: 80
        nodePort: 30090
    EOF

    # 5. Força a reinicialização para limpar o cache antigo
    kubectl rollout restart deployment wildfly-corporativo
    
    echo "=========================================================="
    echo "🎉 FLUXO DE VOTOS INTEGRADO COM SUCESSO!"
    echo "=========================================================="
  displayName: 'Deploy de Arquitetura Unificada de Alta Performance'

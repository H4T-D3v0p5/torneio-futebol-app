trigger:
- main

pool:
  name: 'Default' # Usa o seu robô online no Ubuntu

steps:
- script: |
    echo "=========================================================="
    echo "🚀 DEPLOY BLINDADO SEM DEPENDÊNCIA DE INTERNET"
    echo "=========================================================="
    
    # 1. Limpa resquícios antigos para destravar a memória do cluster
    kubectl delete configmap jogo-html --ignore-not-found
    
    # 2. Cria o ConfigMap novo injetando o jogo.html do desenvolvedor
    kubectl create configmap jogo-html --from-file=index.html=$(System.DefaultWorkingDirectory)/jogo.html -o yaml --dry-run=client | kubectl apply -f -
    
    # 3. Garante que o PostgreSQL Corporativo está rodando e limpo
    cat <<'EOF' | kubectl apply -f -
    apiVersion: v1
    kind: Service
    metadata:
      name: postgres-service
    spec:
      selector:
        app: postgres-corp
      ports:
      - protocol: TCP
        port: 5432
        targetPort: 5432
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: postgres-corporativo
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: postgres-corp
      template:
        metadata:
          labels:
            app: postgres-corp
        spec:
          containers:
          - name: postgres
            image: postgres:15-alpine
            env:
            - name: POSTGRES_DB
              value: javadb
            - name: POSTGRES_USER
              value: javauser
            - name: POSTGRES_PASSWORD
              value: javasenha123
            ports:
            - containerPort: 5432
    EOF

    # 4. Cria os 3 Servidores Web Corporativos rodando o Nginx Ultra-Thread nativo (Livre de Erros e Travamentos)
    cat <<'EOF' | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: wildfly-corporativo
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: wildfly-corp
      template:
        metadata:
          labels:
            app: wildfly-corp
        spec:
          containers:
          - name: python-app
            image: nginx:alpine
            ports:
            - containerPort: 80
            volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          volumes:
          - name: html-volume
            configMap:
              name: jogo-html
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: wildfly-corporativo-service
    spec:
      type: NodePort
      selector:
        app: wildfly-corp
      ports:
      - protocol: TCP
        port: 80
        targetPort: 80
        nodePort: 30090
    EOF

    # 5. Força a reinicialização para destravar o loop do carregamento infinito
    kubectl rollout restart deployment wildfly-corporativo
    
    echo "=========================================================="
    echo "🎉 SISTEMA TRAVADO FOI RESTAURADO COM SUCESSO!"
    echo "=========================================================="
  displayName: 'Deploy de Infraestrutura Desconectada de Alta Carga'
